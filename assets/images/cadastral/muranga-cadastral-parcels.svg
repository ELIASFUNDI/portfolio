<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#b0a090" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background terrain gradient -->
  <defs>
    <linearGradient id="terrain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4cbb8"/>
      <stop offset="40%" style="stop-color:#c8bfa8"/>
      <stop offset="100%" style="stop-color:#b8ad96"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#terrain)"/>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.4"/>

  <!-- River / water body -->
  <path d="M 0 310 Q 120 290 200 320 Q 300 355 380 330 Q 460 305 560 335 Q 650 360 800 340" fill="none" stroke="#7a9eb5" stroke-width="18" stroke-linecap="round" opacity="0.55"/>
  <path d="M 0 316 Q 120 296 200 326 Q 300 361 380 336 Q 460 311 560 341 Q 650 366 800 346" fill="none" stroke="#8fb3cc" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

  <!-- Cadastral parcels — upper zone -->
  <rect x="30" y="30" width="110" height="75" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="140" y="30" width="90" height="75" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="230" y="30" width="130" height="75" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="360" y="30" width="95" height="75" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="455" y="30" width="120" height="75" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="575" y="30" width="85" height="75" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="660" y="30" width="110" height="75" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>

  <rect x="30" y="105" width="110" height="90" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="140" y="105" width="90" height="90" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="230" y="105" width="130" height="55" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="230" y="160" width="130" height="35" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="360" y="105" width="95" height="90" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="455" y="105" width="60" height="90" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="515" y="105" width="60" height="90" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="575" y="105" width="85" height="90" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="660" y="105" width="110" height="90" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>

  <!-- Road — horizontal main -->
  <rect x="0" y="193" width="800" height="14" fill="#c0b49a" stroke="#4a3e2e" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1.5" stroke-dasharray="30,15" opacity="0.5"/>

  <!-- Middle zone parcels -->
  <rect x="30" y="207" width="110" height="95" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="140" y="207" width="90" height="95" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="230" y="207" width="80" height="95" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="310" y="207" width="80" height="95" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>

  <!-- Highlighted selected parcel -->
  <rect x="390" y="207" width="100" height="95" fill="#e8d5a0" fill-opacity="0.55" stroke="#c8860a" stroke-width="2.2"/>
  <text x="440" y="262" text-anchor="middle" font-family="monospace" font-size="9" fill="#7a5500" opacity="0.9">LOT 412</text>

  <rect x="490" y="207" width="85" height="95" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="575" y="207" width="85" height="95" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="660" y="207" width="110" height="95" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>

  <!-- Road — vertical -->
  <rect x="354" y="0" width="14" height="600" fill="#c0b49a" stroke="#4a3e2e" stroke-width="0.8"/>
  <line x1="361" y1="0" x2="361" y2="600" stroke="#fff" stroke-width="1" stroke-dasharray="20,12" opacity="0.4"/>

  <!-- Lower zone parcels -->
  <rect x="30" y="365" width="150" height="100" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="180" y="365" width="90" height="100" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="270" y="365" width="70" height="100" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="390" y="365" width="95" height="100" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="485" y="365" width="90" height="100" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="575" y="365" width="85" height="100" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="660" y="365" width="110" height="100" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>

  <rect x="30" y="465" width="150" height="105" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="180" y="465" width="180" height="105" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="390" y="465" width="185" height="105" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>
  <rect x="575" y="465" width="195" height="105" fill="none" stroke="#4a3e2e" stroke-width="1.6"/>

  <!-- Parcel number labels -->
  <text x="85" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2e1e" opacity="0.7">101</text>
  <text x="185" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2e1e" opacity="0.7">102</text>
  <text x="295" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2e1e" opacity="0.7">103</text>
  <text x="407" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2e1e" opacity="0.7">104</text>
  <text x="515" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2e1e" opacity="0.7">105</text>
  <text x="617" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2e1e" opacity="0.7">106</text>
  <text x="715" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2e1e" opacity="0.7">107</text>

  <!-- Compass rose -->
  <g transform="translate(740,555)">
    <circle cx="0" cy="0" r="22" fill="#d4cbb8" stroke="#4a3e2e" stroke-width="1.2"/>
    <polygon points="0,-18 4,-6 -4,-6" fill="#4a3e2e"/>
    <polygon points="0,18 4,6 -4,6" fill="#9a8e7e"/>
    <polygon points="-18,0 -6,-4 -6,4" fill="#9a8e7e"/>
    <polygon points="18,0 6,-4 6,4" fill="#9a8e7e"/>
    <text x="0" y="-21" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#4a3e2e">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(30,565)">
    <rect x="0" y="0" width="100" height="6" fill="#4a3e2e"/>
    <rect x="100" y="0" width="100" height="6" fill="#d4cbb8" stroke="#4a3e2e" stroke-width="1"/>
    <text x="0" y="18" font-family="monospace" font-size="9" fill="#3a2e1e">0</text>
    <text x="95" y="18" font-family="monospace" font-size="9" fill="#3a2e1e">500m</text>
    <text x="193" y="18" font-family="monospace" font-size="9" fill="#3a2e1e">1km</text>
  </g>

  <!-- Title box -->
  <rect x="30" y="510" width="260" height="42" fill="#d4cbb8" fill-opacity="0.85" stroke="#4a3e2e" stroke-width="1.2"/>
  <text x="160" y="527" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#3a2e1e">MURANG'A COUNTY</text>
  <text x="160" y="542" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#3a2e1e">CADASTRAL PARCEL INDEX MAP</text>
</svg>
